name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: app/sooon-battle-simulate/react-app/package-lock.json

      - name: Install dependencies
        working-directory: app/sooon-battle-simulate/react-app
        run: npm ci

      - name: Build React app
        working-directory: app/sooon-battle-simulate/react-app
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site

          # Keep default static site at /
          rsync -a ./ _site/ \
            --exclude .git \
            --exclude .github \
            --exclude .claude \
            --exclude .history \
            --exclude node_modules \
            --exclude _site \
            --exclude app/sooon-battle-simulate/react-app \
            --exclude app/sooon-battle-simulate/dist

          # Publish React build at /app/sooon-battle-simulate/dist
          mkdir -p _site/app/sooon-battle-simulate/dist
          rsync -a app/sooon-battle-simulate/dist/ _site/app/sooon-battle-simulate/dist/

          touch _site/.nojekyll

      - name: Verify Pages artifact
        run: |
          test -f _site/index.html
          test -f _site/app/sooon-battle-simulate/index.html
          test -f _site/app/sooon-battle-simulate/dist/index.html
          echo "Artifact layout:"
          find _site -maxdepth 4 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
