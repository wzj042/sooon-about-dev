    <script>
      // 版本清理：如果应用版本更新，清除可能与新代码冲突的队列相关本地缓存。
      (function () {
        var APP_VERSION = '2026.07.08-1'
        try {
          var stored = window.localStorage.getItem('sooon-app-version')
          if (stored && stored !== APP_VERSION) {
            window.localStorage.removeItem('sooon-practice-queue')
            window.localStorage.removeItem('sooon-practice-queue-fallback')
            window.localStorage.removeItem('sooon-last-practice-queue-session')
            try {
              window.sessionStorage.removeItem('sooon-practice-queue-fallback')
            } catch {}
          }
          window.localStorage.setItem('sooon-app-version', APP_VERSION)
        } catch {
          // no-op
        }
      })()
